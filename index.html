      "lua_chon": ["Đổi màu chữ của câu nói đó thành màu đỏ", "Đặt câu nói đó trong dấu ngoặc kép (\"\") và bắt buộc phải trích dẫn nguồn ngay lập tức", "Chỉ cần ghi tên tác giả ở dưới cùng bài viết là đủ", "Chỉ cần thay đổi 1 chữ trong câu nói đó là thành của mình"],
      "dap_an_dung": "Đặt câu nói đó trong dấu ngoặc kép (\"\") và bắt buộc phải trích dẫn nguồn ngay lập tức"
    }
];

let currentIndex = 0;
let score = 0;
let currentQuestions = [];

function shuffle(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

function startQuiz() {
    currentIndex = 0;
    score = 0;
    // Xáo trộn ngẫu nhiên toàn bộ 100 câu hỏi
    currentQuestions = shuffle(quizData); 
    document.getElementById('quiz-box').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('score-text').innerText = `Điểm: 0`;
    showQuestion();
}

function showQuestion() {
    let q = currentQuestions[currentIndex];
    document.getElementById('progress-text').innerText = `Câu hỏi: ${currentIndex + 1}/${currentQuestions.length}`;
    document.getElementById('question-text').innerText = q.cau_hoi;
    
    let optionsHtml = '';
    // Xáo trộn ngẫu nhiên thứ tự các đáp án A B C D
    let shuffledOptions = shuffle(q.lua_chon); 
    
    shuffledOptions.forEach(opt => {
        // Fix lỗi dấu nháy đơn bằng cách encode HTML cơ bản
        let safeOpt = opt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        optionsHtml += `<li><button class="btn-option" onclick="checkAnswer(this, '${safeOpt}')">${opt}</button></li>`;
    });
    
    document.getElementById('options-list').innerHTML = optionsHtml;
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('next-button').style.display = 'none';
}

function checkAnswer(btn, selectedOptSafe) {
    let q = currentQuestions[currentIndex];
    let feedback = document.getElementById('feedback-box');
    
    // Đưa selectedOptSafe về nguyên bản nếu có chứa quote
    let selectedOpt = selectedOptSafe.replace(/&quot;/g, '"');
    
    let buttons = document.querySelectorAll('.btn-option');
    buttons.forEach(b => {
        b.disabled = true;
        if(b.innerText === q.dap_an_dung) {
            b.style.background = "#e6f8ec"; 
            b.style.borderColor = "#2ecc71";
            b.style.color = "#27ae60";
        }
    });

    feedback.style.display = 'block';
    if(selectedOpt === q.dap_an_dung) {
        feedback.className = "feedback correct";
        feedback.innerText = "🎉 CHÍNH XÁC!";
        score++;
        document.getElementById('score-text').innerText = `Điểm: ${score}`;
    } else {
        btn.style.background = "#fdedec"; 
        btn.style.borderColor = "#e74c3c";
        btn.style.color = "#c0392b";
        feedback.className = "feedback incorrect";
        feedback.innerText = `❌ RẤT TIẾC! Đáp án đúng là: ${q.dap_an_dung}`;
    }
    document.getElementById('next-button').style.display = 'block';
}

function nextQuestion() {
    currentIndex++;
    if(currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-questions').innerText = currentQuestions.length;
    }
}

function restartQuiz() {
    startQuiz();
}

// Khởi chạy ứng dụng
window.onload = startQuiz;
</script>
