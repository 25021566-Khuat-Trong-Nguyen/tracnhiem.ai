<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Thi Trắc Nghiệm Công Nghe Số & AI</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; line-height: 1.6; background-color: #f0f2f5; color: #333; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #007bff; font-size: 1.6em; margin-bottom: 25px; }
        .progress { color: #666; font-weight: bold; margin-bottom: 15px; font-size: 1.05em; display: flex; justify-content: space-between; }
        .question { font-size: 1.25em; font-weight: bold; margin-bottom: 20px; color: #1a1a1a; background-color: #e7f3ff; padding: 15px; border-left: 5px solid #007bff; border-radius: 4px; }
        .options { list-style: none; padding: 0; margin-bottom: 20px; }
        .options li { margin-bottom: 12px; }
        .btn-option { display: block; width: 100%; padding: 14px; text-align: left; background: #f8f9fa; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; font-size: 1em; transition: all 0.2s; }
        .btn-option:hover:not([disabled]) { background: #e9ecef; border-color: #adb5bd; transform: translateY(-1px); }
        .btn-option[disabled] { cursor: not-allowed; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; display: none; font-size: 1.1em; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .control-panel { margin-top: 25px; }
        .next-btn { display: none; padding: 12px 28px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; float: right; transition: 0.2s; }
        .next-btn:hover { background: #218838; }
        .score-board { text-align: center; padding: 20px; }
        .score-board h2 { color: #28a745; margin-bottom: 15px; }
        .score-board p { font-size: 1.4em; font-weight: bold; margin-bottom: 25px; }
        .restart-btn { padding: 12px 30px; font-size: 1em; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .restart-btn:hover { background: #0069d9; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Luyện Tập Nhập Môn Công Nghệ Số & AI</h1>
    <div id="quiz-box">
        <div class="progress">
            <span id="progress-text">Câu hỏi 1/50</span>
            <span id="score-text" style="color: #28a745;">Đúng: 0</span>
        </div>
        <div class="question" id="question-text">Đang tải câu hỏi...</div>
        <ul class="options" id="options-list"></ul>
        <div class="feedback" id="feedback-box"></div>
        <div class="control-panel">
            <button class="next-btn" id="next-button" onclick="nextQuestion()">Tiếp theo ➔</button>
            <div style="clear:both;"></div>
        </div>
    </div>
    <div id="result-box" class="score-board" style="display:none;">
        <h2>🎉 Chúc Mừng Bạn Đã Hoàn Thành!</h2>
        <p>Kết quả của bạn: <span id="final-score" style="color: #d9534f; font-size: 1.2em;">0</span> / <span id="total-questions">50</span> câu đúng</p>
        <button class="restart-btn" onclick="restartQuiz()">🔄 Làm Lại Bộ Đề Này</button>
    </div>
</div>

<script>

let currentIndex = 0;
let score = 0;
let currentQuestions = [];

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
    currentIndex = 0;
    score = 0;
    // Trộn toàn bộ 50 câu hỏi
    currentQuestions = shuffle([...quizData]); 
    document.getElementById('quiz-box').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('score-text').innerText = `Đúng: 0`;
    showQuestion();
}

function showQuestion() {
    let q = currentQuestions[currentIndex];
    document.getElementById('progress-text').innerText = `Câu hỏi ${currentIndex + 1}/${currentQuestions.length}`;
    document.getElementById('question-text').innerText = q.cau_hoi;
    
    let optionsHtml = '';
    // Trộn ngẫu nhiên thứ tự các đáp án A B C D để không bị nhớ vẹt vị trí
    let shuffledOptions = shuffle([...q.lua_chon]); 
    
    shuffledOptions.forEach(opt => {
        optionsHtml += `<li><button class="btn-option" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button></li>`;
    });
    document.getElementById('options-list').innerHTML = optionsHtml;
    document.getElementById('feedback-box').style.display = 'none';
    document.getElementById('next-button').style.display = 'none';
}

function checkAnswer(btn, selectedOpt) {
    let q = currentQuestions[currentIndex];
    let feedback = document.getElementById('feedback-box');
    
    let buttons = document.querySelectorAll('.btn-option');
    buttons.forEach(b => {
        b.disabled = true;
        if(b.innerText === q.dap_an_dung) {
            b.style.background = "#c3e6cb"; // Đổi màu đáp án đúng thành xanh lục
            b.style.borderColor = "#71dd8a";
        }
    });

    feedback.style.display = 'block';
    if(selectedOpt === q.dap_an_dung) {
        feedback.className = "feedback correct";
        feedback.innerText = "🎉 Chính xác!";
        score++;
        document.getElementById('score-text').innerText = `Đúng: ${score}`;
    } else {
        btn.style.background = "#f5c6cb"; // Đổi màu đáp án bạn chọn sai thành đỏ
        btn.style.borderColor = "#f1b0b7";
        feedback.className = "feedback incorrect";
        feedback.innerText = `❌ Sai rồi! Đáp án chính xác là: ${q.dap_an_dung}`;
    }
    document.getElementById('next-button').style.display = 'block';
}

function nextQuestion() {
    currentIndex++;
    if(currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-questions').innerText = currentQuestions.length;
    }
}

function restartQuiz() {
    startQuiz();
}

// Khởi chạy ứng dụng lần đầu tiên
startQuiz();
</script>
